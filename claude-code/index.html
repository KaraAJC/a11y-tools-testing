<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
  <style>
    /* styles go here in Task 2 */
  </style>
</head>
<body>
  <div id="app">
    <header>
      <h1>Todo List</h1>
      <button id="sort-toggle">Sort by Priority</button>
    </header>

    <form id="add-form">
      <input type="text" id="new-todo-input" placeholder="Add a new todo..." autocomplete="off">
      <select id="priority-select">
        <option value="now">Now</option>
        <option value="this-week">This Week</option>
        <option value="later">Later</option>
      </select>
      <button type="submit">Add</button>
    </form>

    <ul id="todo-list"></ul>
  </div>

  <script>
    /* JS goes here in later tasks */
  </script>
</body>
</html>
