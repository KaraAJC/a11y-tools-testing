<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1e1e2e;
      color: #cdd6f4;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    #app {
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 6px;
      padding: 0.5rem 1rem;
      font-size: 0.875rem;
      font-weight: 600;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }

    #sort-toggle {
      background: #313244;
      color: #cdd6f4;
    }
    #sort-toggle.active {
      background: #89b4fa;
      color: #1e1e2e;
    }

    #add-form {
      display: flex;
      gap: 0.5rem;
    }

    #new-todo-input {
      flex: 1;
      background: #313244;
      border: 1px solid #45475a;
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      color: #cdd6f4;
      font-size: 0.9rem;
    }
    #new-todo-input::placeholder { color: #585b70; }
    #new-todo-input:focus { outline: 2px solid #89b4fa; border-color: transparent; }

    #priority-select {
      background: #313244;
      border: 1px solid #45475a;
      border-radius: 6px;
      padding: 0.5rem 0.5rem;
      color: #cdd6f4;
      font-size: 0.875rem;
      cursor: pointer;
    }
    #priority-select:focus { outline: 2px solid #89b4fa; }

    #add-form button[type="submit"] {
      background: #89b4fa;
      color: #1e1e2e;
    }

    #todo-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: #313244;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      border-left: 3px solid transparent;
    }
    .todo-item.priority-now    { border-left-color: #f38ba8; }
    .todo-item.priority-this-week { border-left-color: #f9e2af; }
    .todo-item.priority-later  { border-left-color: #a6e3a1; }

    .todo-text {
      flex: 1;
      font-size: 0.95rem;
      cursor: pointer;
    }
    .todo-text:hover { text-decoration: underline; text-underline-offset: 3px; }

    .todo-edit-input {
      flex: 1;
      background: #1e1e2e;
      border: 1px solid #89b4fa;
      border-radius: 4px;
      padding: 0.25rem 0.5rem;
      color: #cdd6f4;
      font-size: 0.95rem;
    }
    .todo-edit-input:focus { outline: none; }

    .priority-badge {
      font-size: 0.75rem;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 4px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
      border: none;
    }
    .priority-badge:hover { opacity: 0.8; }
    .badge-now       { background: #f38ba8; color: #1e1e2e; }
    .badge-this-week { background: #f9e2af; color: #1e1e2e; }
    .badge-later     { background: #a6e3a1; color: #1e1e2e; }

    .delete-btn {
      background: transparent;
      color: #585b70;
      font-size: 1rem;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
    }
    .delete-btn:hover { color: #f38ba8; opacity: 1; }

    .empty-message {
      text-align: center;
      color: #585b70;
      font-size: 0.9rem;
      padding: 2rem 0;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      clip-path: inset(50%);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <h1>Todo List</h1>
      <button id="sort-toggle" type="button">Sort by Priority</button>
    </header>

    <form id="add-form">
      <label for="new-todo-input" class="visually-hidden">New todo</label>
      <input type="text" id="new-todo-input" placeholder="Add a new todo..." autocomplete="off">
      <label for="priority-select" class="visually-hidden">Priority</label>
      <select id="priority-select">
        <option value="now">Now</option>
        <option value="this-week">This Week</option>
        <option value="later">Later</option>
      </select>
      <button type="submit">Add</button>
    </form>

    <ul id="todo-list"></ul>
  </div>

  <script>
    // --- State ---
    let todos = [];
    let nextId = 1;
    let sortByPriority = false;

    const PRIORITY_ORDER = { now: 0, 'this-week': 1, later: 2 };
    const PRIORITY_LABEL = { now: 'Now', 'this-week': 'This Week', later: 'Later' };
    const PRIORITY_BADGE_CLASS = { now: 'badge-now', 'this-week': 'badge-this-week', later: 'badge-later' };
    const PRIORITY_ITEM_CLASS = { now: 'priority-now', 'this-week': 'priority-this-week', later: 'priority-later' };
    const PRIORITY_CYCLE = { now: 'this-week', 'this-week': 'later', later: 'now' };

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    // --- Render ---
    function render() {
      const list = document.getElementById('todo-list');
      const sortBtn = document.getElementById('sort-toggle');

      sortBtn.textContent = sortByPriority ? 'Remove Sort' : 'Sort by Priority';
      sortBtn.classList.toggle('active', sortByPriority);

      if (todos.length === 0) {
        list.innerHTML = '<li class="empty-message">No todos yet — add one above.</li>';
        return;
      }

      const displayed = sortByPriority
        ? [...todos].sort((a, b) => PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority])
        : todos;

      list.innerHTML = displayed.map(todo => `
        <li class="todo-item ${PRIORITY_ITEM_CLASS[todo.priority]}" data-id="${todo.id}">
          <span class="todo-text" data-action="edit" data-id="${todo.id}">${escapeHtml(todo.text)}</span>
          <button class="priority-badge ${PRIORITY_BADGE_CLASS[todo.priority]}" data-action="cycle-priority" data-id="${todo.id}">
            ${PRIORITY_LABEL[todo.priority]}
          </button>
          <button class="delete-btn" data-action="delete" data-id="${todo.id}" aria-label="Delete todo">&#x2715;</button>
        </li>
      `).join('');
    }

    // Initial render
    render();

    // --- Add todo ---
    document.getElementById('add-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const input = document.getElementById('new-todo-input');
      const text = input.value.trim();
      if (!text) return;
      const priority = document.getElementById('priority-select').value;
      todos.push({ id: nextId++, text, priority, createdAt: Date.now() });
      input.value = '';
      render();
    });
  </script>
</body>
</html>
