<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-do</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg: #ffffff;
      --color-bg-secondary: #f5f4f1;
      --color-text-primary: #1a1a18;
      --color-text-secondary: #5f5e5a;
      --color-text-tertiary: #888780;
      --color-border-tertiary: rgba(0,0,0,0.12);
      --color-border-secondary: rgba(0,0,0,0.22);
      --color-border-primary: rgba(0,0,0,0.35);
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg: #1c1c1a;
        --color-bg-secondary: #252523;
        --color-text-primary: #f0ede6;
        --color-text-secondary: #b4b2a9;
        --color-text-tertiary: #888780;
        --color-border-tertiary: rgba(255,255,255,0.1);
        --color-border-secondary: rgba(255,255,255,0.18);
        --color-border-primary: rgba(255,255,255,0.28);
      }
    }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--color-bg);
      color: var(--color-text-primary);
      min-height: 100vh;
    }

    .app {
      max-width: 680px;
      margin: 0 auto;
      padding: 3rem 1.5rem 5rem;
    }

    .header { margin-bottom: 2.5rem; }

    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      font-weight: 400;
      color: var(--color-text-primary);
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    .header p {
      font-size: 11px;
      color: var(--color-text-tertiary);
      margin-top: 6px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .add-row {
      display: flex;
      gap: 8px;
      margin-bottom: 2rem;
      align-items: stretch;
    }

    .add-row input[type="text"] {
      flex: 1;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      padding: 10px 14px;
      border: 0.5px solid var(--color-border-secondary);
      border-radius: var(--radius-md);
      background: var(--color-bg);
      color: var(--color-text-primary);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .add-row input[type="text"]:focus {
      border-color: var(--color-border-primary);
      box-shadow: 0 0 0 3px rgba(128,128,128,0.1);
    }

    .add-row select {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      padding: 10px 10px;
      border: 0.5px solid var(--color-border-secondary);
      border-radius: var(--radius-md);
      background: var(--color-bg);
      color: var(--color-text-primary);
      cursor: pointer;
      letter-spacing: 0.03em;
    }

    .btn-add {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      padding: 10px 18px;
      border: 0.5px solid var(--color-border-secondary);
      border-radius: var(--radius-md);
      background: var(--color-bg);
      color: var(--color-text-primary);
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.12s;
      letter-spacing: 0.02em;
    }

    .btn-add:hover { background: var(--color-bg-secondary); }
    .btn-add:active { transform: scale(0.98); }

    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }

    .count {
      font-size: 11px;
      color: var(--color-text-tertiary);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .sort-btn {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      padding: 5px 12px;
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--radius-md);
      background: transparent;
      color: var(--color-text-secondary);
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: all 0.12s;
    }

    .sort-btn.active {
      border-color: var(--color-border-primary);
      color: var(--color-text-primary);
      background: var(--color-bg-secondary);
    }

    .sort-btn:hover { background: var(--color-bg-secondary); }

    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--radius-md);
      background: var(--color-bg);
      transition: border-color 0.12s;
      animation: slideIn 0.18s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .todo-item:hover { border-color: var(--color-border-secondary); }

    .todo-item.done { opacity: 0.45; }
    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: var(--color-text-tertiary);
    }

    .check-btn {
      width: 18px;
      height: 18px;
      min-width: 18px;
      border-radius: 50%;
      border: 0.5px solid var(--color-border-secondary);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.12s;
      padding: 0;
    }

    .check-btn:hover {
      border-color: var(--color-border-primary);
      background: var(--color-bg-secondary);
    }

    .check-btn.checked {
      background: var(--color-text-secondary);
      border-color: var(--color-text-secondary);
    }

    .check-btn.checked::after {
      content: '';
      width: 6px;
      height: 4px;
      border-left: 1.5px solid var(--color-bg);
      border-bottom: 1.5px solid var(--color-bg);
      transform: rotate(-45deg) translate(0px, -1px);
      display: block;
    }

    .priority-dot {
      width: 7px;
      height: 7px;
      min-width: 7px;
      border-radius: 50%;
    }

    .priority-dot.now  { background: #D85A30; }
    .priority-dot.week { background: #BA7517; }
    .priority-dot.later{ background: #888780; }

    .todo-text {
      flex: 1;
      font-size: 13px;
      color: var(--color-text-primary);
      line-height: 1.4;
      cursor: text;
      min-width: 0;
      word-break: break-word;
    }

    .todo-edit-input {
      flex: 1;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--color-text-primary);
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--color-border-primary);
      outline: none;
      padding: 0 0 1px;
      min-width: 0;
    }

    .priority-label {
      font-size: 10px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 20px;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      transition: opacity 0.1s;
    }

    .priority-label:hover { opacity: 0.75; }

    .priority-label.now  { background: #FAECE7; color: #993C1D; }
    .priority-label.week { background: #FAEEDA; color: #854F0B; }
    .priority-label.later{ background: #F1EFE8; color: #5F5E5A; }

    @media (prefers-color-scheme: dark) {
      .priority-label.now  { background: #4A1B0C; color: #F0997B; }
      .priority-label.week { background: #412402; color: #EF9F27; }
      .priority-label.later{ background: #2C2C2A; color: #B4B2A9; }
    }

    .del-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--color-text-tertiary);
      font-size: 18px;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.12s, color 0.12s;
    }

    .todo-item:hover .del-btn { opacity: 1; }
    .del-btn:hover { color: #c0392b; }

    .empty {
      text-align: center;
      padding: 3rem 0;
      color: var(--color-text-tertiary);
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .section-label {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--color-text-tertiary);
      padding: 1.2rem 0 0.5rem;
      font-weight: 500;
    }

    .section-label:first-child { padding-top: 0; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>To-do</h1>
      <p>Click text to edit &middot; Click label to change priority</p>
    </div>

    <div class="add-row">
      <input type="text" id="newTodoInput" placeholder="Add a new task..." />
      <select id="newPriority">
        <option value="now">Now</option>
        <option value="week">This week</option>
        <option value="later" selected>Later</option>
      </select>
      <button class="btn-add" id="addBtn">+ Add</button>
    </div>

    <div class="controls">
      <span class="count" id="countLabel">0 tasks</span>
      <button class="sort-btn" id="sortBtn">Sort by priority</button>
    </div>

    <div class="todo-list" id="todoList"></div>
  </div>

  <script>
    let todos = [];
    let nextId = 1;
    let sortByPriority = false;
    let editingId = null;

    const priorityOrder = { now: 0, week: 1, later: 2 };
    const priorityLabels = { now: 'Now', week: 'This week', later: 'Later' };

    function render() {
      const list = document.getElementById('todoList');
      const countLabel = document.getElementById('countLabel');
      const sortBtn = document.getElementById('sortBtn');

      sortBtn.classList.toggle('active', sortByPriority);

      const total = todos.length;
      const doneCount = todos.filter(t => t.done).length;
      countLabel.textContent = total === 0
        ? '0 tasks'
        : `${total} task${total !== 1 ? 's' : ''}${doneCount > 0 ? ` · ${doneCount} done` : ''}`;

      list.innerHTML = '';

      if (todos.length === 0) {
        list.innerHTML = '<div class="empty">No tasks yet — add one above</div>';
        return;
      }

      if (sortByPriority) {
        const groups = { now: [], week: [], later: [] };
        todos.forEach(t => groups[t.priority].push(t));
        ['now', 'week', 'later'].forEach(p => {
          if (groups[p].length === 0) return;
          const lbl = document.createElement('div');
          lbl.className = 'section-label';
          lbl.textContent = priorityLabels[p];
          list.appendChild(lbl);
          groups[p].forEach(t => list.appendChild(buildItem(t)));
        });
      } else {
        todos.forEach(t => list.appendChild(buildItem(t)));
      }
    }

    function buildItem(todo) {
      const item = document.createElement('div');
      item.className = 'todo-item' + (todo.done ? ' done' : '');
      item.dataset.id = todo.id;

      const check = document.createElement('button');
      check.className = 'check-btn' + (todo.done ? ' checked' : '');
      check.title = todo.done ? 'Mark undone' : 'Mark done';
      check.addEventListener('click', () => toggleDone(todo.id));

      const dot = document.createElement('div');
      dot.className = `priority-dot ${todo.priority}`;

      let textEl;
      if (editingId === todo.id) {
        textEl = document.createElement('input');
        textEl.type = 'text';
        textEl.className = 'todo-edit-input';
        textEl.value = todo.text;
        textEl.addEventListener('blur', () => finishEdit(todo.id, textEl.value));
        textEl.addEventListener('keydown', e => {
          if (e.key === 'Enter') textEl.blur();
          if (e.key === 'Escape') { editingId = null; render(); }
        });
        setTimeout(() => textEl.focus(), 0);
      } else {
        textEl = document.createElement('span');
        textEl.className = 'todo-text';
        textEl.textContent = todo.text;
        textEl.title = 'Click to edit';
        textEl.addEventListener('click', () => startEdit(todo.id));
      }

      const priorityEl = document.createElement('span');
      priorityEl.className = `priority-label ${todo.priority}`;
      priorityEl.textContent = priorityLabels[todo.priority];
      priorityEl.title = 'Click to change priority';
      priorityEl.addEventListener('click', () => cyclePriority(todo.id));

      const del = document.createElement('button');
      del.className = 'del-btn';
      del.innerHTML = '&times;';
      del.title = 'Delete';
      del.addEventListener('click', () => deleteTodo(todo.id));

      item.appendChild(check);
      item.appendChild(dot);
      item.appendChild(textEl);
      item.appendChild(priorityEl);
      item.appendChild(del);

      return item;
    }

    function addTodo() {
      const input = document.getElementById('newTodoInput');
      const priority = document.getElementById('newPriority').value;
      const text = input.value.trim();
      if (!text) { input.focus(); return; }
      todos.push({ id: nextId++, text, priority, done: false });
      input.value = '';
      input.focus();
      render();
    }

    function toggleDone(id) {
      const t = todos.find(t => t.id === id);
      if (t) t.done = !t.done;
      render();
    }

    function startEdit(id) {
      editingId = id;
      render();
    }

    function finishEdit(id, value) {
      const t = todos.find(t => t.id === id);
      if (t) t.text = value.trim() || t.text;
      editingId = null;
      render();
    }

    function cyclePriority(id) {
      const t = todos.find(t => t.id === id);
      if (!t) return;
      const order = ['now', 'week', 'later'];
      t.priority = order[(order.indexOf(t.priority) + 1) % 3];
      render();
    }

    function deleteTodo(id) {
      todos = todos.filter(t => t.id !== id);
      if (editingId === id) editingId = null;
      render();
    }

    document.getElementById('addBtn').addEventListener('click', addTodo);
    document.getElementById('newTodoInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });
    document.getElementById('sortBtn').addEventListener('click', () => {
      sortByPriority = !sortByPriority;
      render();
    });

    render();
  </script>
</body>
</html>
