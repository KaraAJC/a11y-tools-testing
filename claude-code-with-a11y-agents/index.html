<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Todos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* Skip link */
    .skip-link {
      position: absolute;
      top: -100%;
      left: 0;
      background: #ffffff;
      color: #764ba2;
      font-weight: 700;
      padding: 8px 16px;
      border-radius: 0 0 8px 0;
      text-decoration: none;
      z-index: 100;
    }
    .skip-link:focus { top: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
      font-family: system-ui, -apple-system, sans-serif;
    }

    main {
      /* Dark glass: rgba(0,0,0,0.25) over gradient → effective bg ~#534c95, L≈0.094
         White text on card = 7.3:1 (AA pass). Light glass was too mid-toned (4.2:1 fail). */
      background: rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 560px;
    }

    h1 {
      color: #ffffff;
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 24px;
      letter-spacing: -0.02em;
    }

    /* Add form */
    #add-form {
      display: grid;
      grid-template-columns: 1fr auto auto;
      grid-template-rows: auto auto auto;
      gap: 8px;
      margin-bottom: 16px;
    }

    #add-form label {
      color: #ffffff;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      align-self: end;
    }

    #add-form label[for="new-todo-input"]    { grid-column: 1; grid-row: 1; }
    #add-form label[for="new-todo-priority"] { grid-column: 2; grid-row: 1; }
    #add-form #new-todo-input                { grid-column: 1; grid-row: 2; }
    #add-form #new-todo-priority             { grid-column: 2; grid-row: 2; }
    #add-form button[type="submit"]          { grid-column: 3; grid-row: 2; align-self: end; }
    #add-form .add-error                     { grid-column: 1 / -1; grid-row: 3; }

    .add-error {
      color: #ffffff;
      font-size: 0.8rem;
    }

    input[type="text"], select {
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 8px;
      color: #ffffff;
      font-size: 0.95rem;
      padding: 10px 12px;
      width: 100%;
    }

    /* rgba(255,255,255,0.55) was ~1.84:1 on glass input bg — fail. White = 4.5:1+ — pass. */
    input[type="text"]::placeholder { color: rgba(255, 255, 255, 0.9); }

    input[type="text"]:focus, select:focus {
      outline: 3px solid #ffffff;
      outline-offset: 2px;
      border-color: transparent;
    }

    input[aria-invalid="true"] {
      border-color: #c0392b;
      outline: 3px solid #c0392b;
    }

    select option { background: #764ba2; color: #ffffff; }

    .btn {
      background: #ffffff;
      color: #764ba2;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 700;
      padding: 10px 18px;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn:hover { background: rgba(255, 255, 255, 0.9); }

    .btn:focus {
      /* #764ba2 outline on white button = 5.7:1 (AA pass). White on white was 1:1 fail. */
      outline: 3px solid #764ba2;
      outline-offset: 2px;
    }

    /* Sort button */
    #sort-btn {
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 8px;
      color: #ffffff;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 16px;
      padding: 7px 14px;
    }

    #sort-btn:hover { background: rgba(255, 255, 255, 0.25); }

    #sort-btn:focus {
      outline: 3px solid #ffffff;
      outline-offset: 2px;
    }

    #sort-btn[aria-pressed="true"] {
      background: rgba(255, 255, 255, 0.9);
      color: #764ba2;
    }

    /* Todo list */
    #todo-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #todo-list li {
      /* Dark glass items: rgba(0,0,0,0.2) over card → effective bg ~#423d77, L≈0.063
         White text on item = 9.3:1 (AA pass). Light rgba(255,255,255,0.12) was 3.35:1 fail. */
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      flex-wrap: wrap;
    }

    .todo-text {
      color: #ffffff;
      flex: 1;
      font-size: 0.95rem;
      min-width: 0;
      word-break: break-word;
    }

    /* Priority badges */
    .priority-btn {
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 3px 9px;
      white-space: nowrap;
    }

    .priority-btn:focus {
      outline: 3px solid #ffffff;
      outline-offset: 2px;
    }

    .priority-btn[data-priority="now"]       { background: #c0392b; color: #ffffff; }
    .priority-btn[data-priority="this-week"] { background: #ffd93d; color: #1a1a00; }
    /* #1a7a3a on white: ~5.4:1 — passes WCAG AA. #27ae60 was only ~2.9:1 */
    .priority-btn[data-priority="later"]     { background: #1a7a3a; color: #ffffff; }

    /* Inline priority select (replaces badge during change) */
    .priority-select {
      background: rgba(255, 255, 255, 0.9);
      border: 2px solid #ffffff;
      border-radius: 6px;
      color: #333;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 3px 6px;
    }

    .priority-select:focus {
      outline: 3px solid #ffffff;
      outline-offset: 2px;
    }

    /* Icon buttons (edit, delete) */
    .icon-btn {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 6px;
      color: #ffffff;
      cursor: pointer;
      font-size: 0.9rem;
      line-height: 1;
      padding: 4px 7px;
    }

    .icon-btn:hover { background: rgba(255, 255, 255, 0.15); color: #ffffff; }

    .icon-btn:focus {
      outline: 3px solid #ffffff;
      outline-offset: 2px;
    }

    .icon-btn.delete-btn:hover { background: rgba(192, 57, 43, 0.4); border-color: #c0392b; color: #ffffff; }

    /* Inline edit row */
    .edit-input {
      background: rgba(255, 255, 255, 0.9);
      border: 2px solid #ffffff;
      border-radius: 6px;
      color: #333;
      flex: 1;
      font-size: 0.95rem;
      min-width: 120px;
      padding: 6px 10px;
    }

    .edit-input:focus {
      /* #764ba2 on near-white input = 5.4:1 (AA pass). Yellow #ffd93d on near-white was 1.24:1 fail. */
      outline: 3px solid #764ba2;
      outline-offset: 2px;
    }

    .edit-input[aria-invalid="true"] {
      border-color: #c0392b;
      outline: 3px solid #c0392b;
    }

    .edit-error {
      color: #ffffff;
      font-size: 0.8rem;
      width: 100%;
      margin-top: 2px;
    }

    .save-btn {
      background: #1a7a3a;
      border: 1px solid #1a7a3a;
      border-radius: 6px;
      color: #ffffff;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 700;
      padding: 5px 10px;
    }

    .save-btn:hover { background: #145e2c; }

    .save-btn:focus {
      outline: 3px solid #ffffff;
      outline-offset: 2px;
    }

    .cancel-btn {
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 6px;
      color: #ffffff;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 700;
      padding: 5px 10px;
    }

    .cancel-btn:hover { background: rgba(255, 255, 255, 0.25); }

    .cancel-btn:focus {
      outline: 3px solid #ffffff;
      outline-offset: 2px;
    }

    /* Screen-reader only utility */
    .sr-only {
      clip: rect(0, 0, 0, 0);
      clip-path: inset(50%);
      border: 0;
      height: 1px;
      margin: -1px;
      overflow: hidden;
      padding: 0;
      position: absolute;
      white-space: nowrap;
      width: 1px;
    }

    /* Empty state */
    .empty-state {
      color: #ffffff;
      font-size: 0.9rem;
      padding: 16px 0;
      text-align: center;
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <main id="main-content" tabindex="-1">
    <h1>My Todos</h1>

    <form id="add-form" aria-label="Add new todo" novalidate>
      <label for="new-todo-input">New todo</label>
      <label for="new-todo-priority">Priority</label>
      <input id="new-todo-input" type="text" placeholder="What needs doing?"
             autocomplete="off" required
             aria-describedby="new-todo-error" aria-invalid="false">
      <select id="new-todo-priority">
        <option value="now">Now</option>
        <option value="this-week">This Week</option>
        <option value="later" selected>Later</option>
      </select>
      <button type="submit" class="btn">Add todo</button>
      <span id="new-todo-error" role="alert" class="add-error sr-only"></span>
    </form>

    <button id="sort-btn" aria-pressed="false">Sort by Priority</button>

    <div id="live-region" role="status" class="sr-only"></div>

    <p id="empty-state" class="empty-state">No todos yet. Add one above.</p>
    <ul id="todo-list"></ul>
  </main>

  <script>
    // ─── State ───────────────────────────────────────────────────────────────
    let todos = [];
    let sortEnabled = false;
    let editingId = null;
    let nextId = 1;

    // ─── Helpers ─────────────────────────────────────────────────────────────
    const PRIORITY_ORDER = { now: 0, 'this-week': 1, later: 2 };
    const PRIORITY_LABELS = { now: 'NOW', 'this-week': 'THIS WEEK', later: 'LATER' };
    const PRIORITY_HUMAN  = { now: 'Now', 'this-week': 'This Week', later: 'Later' };

    function announce(msg) {
      const region = document.getElementById('live-region');
      region.textContent = '';
      // Force re-announcement even for identical messages
      requestAnimationFrame(() => { region.textContent = msg; });
    }

    function getSortedTodos() {
      if (!sortEnabled) return [...todos];
      // Sort order: now (0) → this-week (1) → later (2)
      return [...todos].sort((a, b) => PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority]);
    }

    // ─── Render ──────────────────────────────────────────────────────────────
    function render() {
      const list = document.getElementById('todo-list');
      const emptyState = document.getElementById('empty-state');
      list.innerHTML = '';

      const displayed = getSortedTodos();

      if (displayed.length === 0) {
        emptyState.removeAttribute('hidden');
        return;
      }

      emptyState.setAttribute('hidden', '');
      displayed.forEach(todo => {
        const li = buildTodoItem(todo);
        list.appendChild(li);
      });
    }

    function buildTodoItem(todo) {
      const li = document.createElement('li');
      li.dataset.id = todo.id;

      if (editingId === todo.id) {
        buildEditRow(li, todo);
      } else {
        buildViewRow(li, todo);
      }

      return li;
    }

    function buildViewRow(li, todo) {
      // Text
      const span = document.createElement('span');
      span.className = 'todo-text';
      span.textContent = todo.text;

      // Priority badge button
      const priorityBtn = document.createElement('button');
      priorityBtn.className = 'priority-btn';
      priorityBtn.dataset.priority = todo.priority;
      priorityBtn.setAttribute('aria-label', `Change priority for ${todo.text}, currently ${PRIORITY_HUMAN[todo.priority]}`);
      priorityBtn.innerHTML = `<span aria-hidden="true">${PRIORITY_LABELS[todo.priority]}</span>`;
      priorityBtn.addEventListener('click', () => startPriorityChange(todo.id));

      // Edit button
      const editBtn = document.createElement('button');
      editBtn.className = 'icon-btn edit-btn';
      editBtn.setAttribute('aria-label', `Edit ${todo.text}`);
      editBtn.innerHTML = '<span aria-hidden="true">✏</span>';
      editBtn.addEventListener('click', () => startEdit(todo.id));

      // Delete button
      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'icon-btn delete-btn';
      deleteBtn.setAttribute('aria-label', `Delete ${todo.text}`);
      deleteBtn.innerHTML = '<span aria-hidden="true">✕</span>';
      deleteBtn.addEventListener('click', () => deleteTodo(todo.id));

      li.append(span, priorityBtn, editBtn, deleteBtn);
    }

    function buildEditRow(li, todo) {
      const errorId = `edit-error-${todo.id}`;

      // Edit input
      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'edit-input';
      input.value = todo.text;
      input.setAttribute('aria-label', 'Edit todo text');
      input.setAttribute('aria-describedby', errorId);
      input.setAttribute('aria-invalid', 'false');
      input.setAttribute('autocomplete', 'off');

      // Error message (hidden until needed; role="alert" announces on content change)
      const error = document.createElement('span');
      error.id = errorId;
      error.className = 'edit-error sr-only';
      error.setAttribute('role', 'alert');
      error.textContent = '';

      // Save button
      const saveBtn = document.createElement('button');
      saveBtn.className = 'save-btn';
      saveBtn.textContent = 'Save';
      saveBtn.setAttribute('aria-label', `Save edit for ${todo.text}`);

      // Cancel button
      const cancelBtn = document.createElement('button');
      cancelBtn.className = 'cancel-btn';
      cancelBtn.textContent = 'Cancel';
      cancelBtn.setAttribute('aria-label', `Cancel edit for ${todo.text}`);

      function showEditError(msg) {
        input.setAttribute('aria-invalid', 'true');
        error.textContent = msg;
        error.classList.remove('sr-only');
        input.focus();
      }

      function clearEditError() {
        if (input.getAttribute('aria-invalid') === 'true') {
          input.setAttribute('aria-invalid', 'false');
          error.textContent = '';
          error.classList.add('sr-only');
        }
      }

      function attemptSave() {
        const trimmed = input.value.trim();
        if (!trimmed) {
          showEditError('Todo text cannot be empty.');
          return;
        }
        const todo_ref = todos.find(t => t.id === todo.id);
        if (todo_ref) todo_ref.text = trimmed;
        editingId = null;
        render();
        announce(`Updated: ${trimmed}`);
        // Return focus to edit button (same as cancel)
        const editBtn = document.querySelector(`[data-id="${todo.id}"] .edit-btn`);
        if (editBtn) editBtn.focus();
      }

      function cancelEdit() {
        editingId = null;
        render();
        const editBtn = document.querySelector(`[data-id="${todo.id}"] .edit-btn`);
        if (editBtn) editBtn.focus();
      }

      input.addEventListener('input', clearEditError);

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); attemptSave(); }
        if (e.key === 'Escape') { cancelEdit(); }
      });

      saveBtn.addEventListener('click', attemptSave);
      cancelBtn.addEventListener('click', cancelEdit);

      li.append(input, saveBtn, cancelBtn, error);
    }

    // ─── Actions ─────────────────────────────────────────────────────────────
    function addTodo(text, priority) {
      todos.push({ id: nextId++, text, priority });
      render();
      announce(`Added: ${text}`);
    }

    function deleteTodo(id) {
      const list = document.getElementById('todo-list');
      const items = Array.from(list.querySelectorAll('li[data-id]'));
      const idx = items.findIndex(li => Number(li.dataset.id) === id);

      const todo = todos.find(t => t.id === id);
      const deletedText = todo ? todo.text : '';

      todos = todos.filter(t => t.id !== id);
      render();
      announce(`Deleted: ${deletedText}`);

      // Move focus: next item → previous item → add input
      // idx is visual (sorted) position; updatedItems preserves the same sort order,
      // so idx still points to the item that followed the deleted one.
      const updatedItems = Array.from(document.querySelectorAll('#todo-list li[data-id]'));
      const target = updatedItems[idx] || updatedItems[idx - 1];
      if (target) {
        const deleteBtn = target.querySelector('.delete-btn');
        if (deleteBtn) deleteBtn.focus();
      } else {
        document.getElementById('new-todo-input').focus();
      }
    }

    function startEdit(id) {
      editingId = id;
      render();
      const input = document.querySelector(`[data-id="${id}"] .edit-input`);
      if (input) input.focus();
    }

    function startPriorityChange(id) {
      const todo = todos.find(t => t.id === id);
      if (!todo) return;

      const li = document.querySelector(`[data-id="${id}"]`);
      if (!li) return;

      const priorityBtn = li.querySelector('.priority-btn');
      if (!priorityBtn) return;

      // Replace badge with inline select
      const sel = document.createElement('select');
      sel.className = 'priority-select';
      sel.setAttribute('aria-label', `Priority for ${todo.text}`);

      ['now', 'this-week', 'later'].forEach(val => {
        const opt = document.createElement('option');
        opt.value = val;
        opt.textContent = PRIORITY_HUMAN[val];
        if (val === todo.priority) opt.selected = true;
        sel.appendChild(opt);
      });

      // Guard flag — prevents double-fire between keydown and blur
      let committed = false;

      function commitChange() {
        if (committed) return;
        committed = true;
        const newPriority = sel.value;
        todo.priority = newPriority;
        render();
        announce(`Priority changed to ${PRIORITY_HUMAN[newPriority]}`);
        // Return focus to priority badge
        const badge = document.querySelector(`[data-id="${id}"] .priority-btn`);
        if (badge) badge.focus();
      }

      function cancelChange(restoreFocus) {
        if (committed) return;
        committed = true;
        render();
        if (restoreFocus) {
          const badge = document.querySelector(`[data-id="${id}"] .priority-btn`);
          if (badge) badge.focus();
        }
        // When restoreFocus=false (Tab away), let the browser handle focus naturally
      }

      // Enter commits; Escape cancels and returns focus to badge.
      // No 'change' event — it fires on every arrow keypress in Chrome/Firefox/Edge,
      // which would destroy the select before the user finishes browsing options.
      sel.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); commitChange(); }
        if (e.key === 'Escape') { e.preventDefault(); cancelChange(true); }
      });

      // Blur (Tab away): commit if value changed, cancel silently if unchanged.
      // Never steal focus — Tab has already moved it to the next element.
      sel.addEventListener('blur', () => {
        if (committed) return;
        committed = true;
        if (sel.value !== originalPriority) {
          const newPriority = sel.value;
          todo.priority = newPriority;
          render();
          announce(`Priority changed to ${PRIORITY_HUMAN[newPriority]}`);
        } else {
          render(); // No change; restore badge silently
        }
      });

      priorityBtn.replaceWith(sel);
      sel.focus();
    }

    // ─── Event wiring ────────────────────────────────────────────────────────
    const addForm = document.getElementById('add-form');
    const addInput = document.getElementById('new-todo-input');
    const addError = document.getElementById('new-todo-error');

    function showAddError(msg) {
      addInput.setAttribute('aria-invalid', 'true');
      addError.textContent = msg;
      addError.classList.remove('sr-only');
      addInput.focus();
    }

    addInput.addEventListener('input', () => {
      if (addInput.getAttribute('aria-invalid') === 'true') {
        addInput.setAttribute('aria-invalid', 'false');
        addError.textContent = '';
        addError.classList.add('sr-only');
      }
    });

    addForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const priority = document.getElementById('new-todo-priority').value;
      const text = addInput.value.trim();
      if (!text) {
        showAddError('Please enter todo text.');
        return;
      }
      addTodo(text, priority);
      addInput.value = '';
      // Clear any lingering error state
      addInput.setAttribute('aria-invalid', 'false');
      addError.textContent = '';
      addError.classList.add('sr-only');
      addInput.focus();
    });

    document.getElementById('sort-btn').addEventListener('click', () => {
      sortEnabled = !sortEnabled;
      const btn = document.getElementById('sort-btn');
      btn.setAttribute('aria-pressed', String(sortEnabled));
      render();
      announce(sortEnabled ? 'Sorted by priority' : 'Original order restored');
      // If an edit is in progress, restore focus to the edit input after re-render
      if (editingId !== null) {
        const input = document.querySelector(`[data-id="${editingId}"] .edit-input`);
        if (input) input.focus();
      }
    });

    // ─── Init ────────────────────────────────────────────────────────────────
    render();
  </script>
</body>
</html>
