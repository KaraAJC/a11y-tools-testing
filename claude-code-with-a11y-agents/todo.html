<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Todos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
      font-family: system-ui, -apple-system, sans-serif;
    }

    main {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 560px;
    }

    h1 {
      color: #ffffff;
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 24px;
      letter-spacing: -0.02em;
    }

    /* Add form */
    #add-form {
      display: grid;
      grid-template-columns: 1fr auto auto;
      grid-template-rows: auto auto;
      gap: 8px;
      margin-bottom: 16px;
    }

    #add-form label {
      color: rgba(255, 255, 255, 0.85);
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      align-self: end;
    }

    #add-form label[for="new-todo-input"] { grid-column: 1; grid-row: 1; }
    #add-form label[for="new-todo-priority"] { grid-column: 2; grid-row: 1; }
    #add-form #new-todo-input { grid-column: 1; grid-row: 2; }
    #add-form #new-todo-priority { grid-column: 2; grid-row: 2; }
    #add-form button[type="submit"] { grid-column: 3; grid-row: 2; align-self: end; }

    input[type="text"], select {
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 8px;
      color: #ffffff;
      font-size: 0.95rem;
      padding: 10px 12px;
      width: 100%;
    }

    input[type="text"]::placeholder { color: rgba(255, 255, 255, 0.55); }

    input[type="text"]:focus, select:focus {
      outline: 3px solid #ffffff;
      outline-offset: 2px;
      border-color: transparent;
    }

    select option { background: #764ba2; color: #ffffff; }

    .btn {
      background: #ffffff;
      color: #764ba2;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 700;
      padding: 10px 18px;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn:hover { background: rgba(255, 255, 255, 0.9); }

    .btn:focus {
      outline: 3px solid #ffffff;
      outline-offset: 2px;
    }

    /* Sort button */
    #sort-btn {
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 8px;
      color: #ffffff;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 16px;
      padding: 7px 14px;
    }

    #sort-btn:hover { background: rgba(255, 255, 255, 0.25); }

    #sort-btn:focus {
      outline: 3px solid #ffffff;
      outline-offset: 2px;
    }

    #sort-btn[aria-pressed="true"] {
      background: rgba(255, 255, 255, 0.9);
      color: #764ba2;
    }

    /* Todo list */
    #todo-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #todo-list li {
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      flex-wrap: wrap;
    }

    .todo-text {
      color: #ffffff;
      flex: 1;
      font-size: 0.95rem;
      min-width: 0;
      word-break: break-word;
    }

    /* Priority badges */
    .priority-btn {
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 3px 9px;
      white-space: nowrap;
    }

    .priority-btn:focus {
      outline: 3px solid #ffffff;
      outline-offset: 2px;
    }

    .priority-btn[data-priority="now"]       { background: #c0392b; color: #ffffff; }
    .priority-btn[data-priority="this-week"] { background: #ffd93d; color: #1a1a00; }
    .priority-btn[data-priority="later"]     { background: #27ae60; color: #ffffff; }

    /* Inline priority select (replaces badge during change) */
    .priority-select {
      background: rgba(255, 255, 255, 0.9);
      border: 2px solid #ffffff;
      border-radius: 6px;
      color: #333;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 3px 6px;
    }

    .priority-select:focus {
      outline: 3px solid #ffffff;
      outline-offset: 2px;
    }

    /* Icon buttons (edit, delete) */
    .icon-btn {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 6px;
      color: rgba(255, 255, 255, 0.8);
      cursor: pointer;
      font-size: 0.9rem;
      line-height: 1;
      padding: 4px 7px;
    }

    .icon-btn:hover { background: rgba(255, 255, 255, 0.15); color: #ffffff; }

    .icon-btn:focus {
      outline: 3px solid #ffffff;
      outline-offset: 2px;
    }

    .icon-btn.delete-btn:hover { background: rgba(192, 57, 43, 0.4); border-color: #c0392b; color: #ffffff; }

    /* Inline edit row */
    .edit-input {
      background: rgba(255, 255, 255, 0.9);
      border: 2px solid #ffffff;
      border-radius: 6px;
      color: #333;
      flex: 1;
      font-size: 0.95rem;
      min-width: 120px;
      padding: 6px 10px;
    }

    .edit-input:focus {
      outline: 3px solid #ffd93d;
      outline-offset: 2px;
    }

    .edit-input[aria-invalid="true"] {
      border-color: #c0392b;
      outline: 3px solid #c0392b;
    }

    .edit-error {
      color: #ffd93d;
      font-size: 0.8rem;
      width: 100%;
      margin-top: 2px;
    }

    .save-btn {
      background: #27ae60;
      border: 1px solid #27ae60;
      border-radius: 6px;
      color: #ffffff;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 700;
      padding: 5px 10px;
    }

    .save-btn:hover { background: #219a52; }

    .save-btn:focus {
      outline: 3px solid #ffffff;
      outline-offset: 2px;
    }

    .cancel-btn {
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 6px;
      color: #ffffff;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 700;
      padding: 5px 10px;
    }

    .cancel-btn:hover { background: rgba(255, 255, 255, 0.25); }

    .cancel-btn:focus {
      outline: 3px solid #ffffff;
      outline-offset: 2px;
    }

    /* Screen-reader only utility */
    .sr-only {
      clip: rect(0, 0, 0, 0);
      border: 0;
      height: 1px;
      margin: -1px;
      overflow: hidden;
      padding: 0;
      position: absolute;
      white-space: nowrap;
      width: 1px;
    }

    /* Empty state */
    .empty-state {
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.9rem;
      padding: 16px 0;
      text-align: center;
    }
  </style>
</head>
<body>
  <main>
    <h1>My Todos</h1>

    <form id="add-form" novalidate>
      <label for="new-todo-input">New todo</label>
      <label for="new-todo-priority">Priority</label>
      <input id="new-todo-input" type="text" placeholder="What needs doing?" autocomplete="off" required>
      <select id="new-todo-priority">
        <option value="now">Now</option>
        <option value="this-week">This Week</option>
        <option value="later" selected>Later</option>
      </select>
      <button type="submit" class="btn">Add</button>
    </form>

    <button id="sort-btn" aria-pressed="false">Sort by Priority</button>

    <div id="live-region" role="status" aria-live="polite" aria-atomic="true" class="sr-only"></div>

    <ul id="todo-list" aria-label="Todo items"></ul>
  </main>

  <script>
    // ─── State ───────────────────────────────────────────────────────────────
    let todos = [];
    let sortEnabled = false;
    let editingId = null;
    let nextId = 1;

    // ─── Helpers ─────────────────────────────────────────────────────────────
    const PRIORITY_ORDER = { now: 0, 'this-week': 1, later: 2 };
    const PRIORITY_LABELS = { now: 'NOW', 'this-week': 'THIS WEEK', later: 'LATER' };
    const PRIORITY_HUMAN  = { now: 'Now', 'this-week': 'This Week', later: 'Later' };

    function announce(msg) {
      const region = document.getElementById('live-region');
      region.textContent = '';
      // Force re-announcement even for identical messages
      requestAnimationFrame(() => { region.textContent = msg; });
    }

    function getSortedTodos() {
      if (!sortEnabled) return [...todos];
      return [...todos].sort((a, b) => PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority]);
    }

    // ─── Render ──────────────────────────────────────────────────────────────
    function render() {
      const list = document.getElementById('todo-list');
      list.innerHTML = '';

      const displayed = getSortedTodos();

      if (displayed.length === 0) {
        const empty = document.createElement('li');
        empty.className = 'empty-state';
        empty.textContent = 'No todos yet. Add one above.';
        list.appendChild(empty);
        return;
      }

      displayed.forEach(todo => {
        const li = buildTodoItem(todo);
        list.appendChild(li);
      });
    }

    function buildTodoItem(todo) {
      const li = document.createElement('li');
      li.dataset.id = todo.id;

      if (editingId === todo.id) {
        buildEditRow(li, todo);
      } else {
        buildViewRow(li, todo);
      }

      return li;
    }

    function buildViewRow(li, todo) {
      // Text
      const span = document.createElement('span');
      span.className = 'todo-text';
      span.textContent = todo.text;

      // Priority badge button
      const priorityBtn = document.createElement('button');
      priorityBtn.className = 'priority-btn';
      priorityBtn.dataset.priority = todo.priority;
      priorityBtn.setAttribute('aria-label', `Change priority for ${todo.text}, currently ${PRIORITY_HUMAN[todo.priority]}`);
      priorityBtn.innerHTML = `<span aria-hidden="true">${PRIORITY_LABELS[todo.priority]}</span>`;
      priorityBtn.addEventListener('click', () => startPriorityChange(todo.id));

      // Edit button
      const editBtn = document.createElement('button');
      editBtn.className = 'icon-btn';
      editBtn.setAttribute('aria-label', `Edit ${todo.text}`);
      editBtn.innerHTML = '<span aria-hidden="true">✏</span>';
      editBtn.addEventListener('click', () => startEdit(todo.id));

      // Delete button
      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'icon-btn delete-btn';
      deleteBtn.setAttribute('aria-label', `Delete ${todo.text}`);
      deleteBtn.innerHTML = '<span aria-hidden="true">✕</span>';
      deleteBtn.addEventListener('click', () => deleteTodo(todo.id));

      li.append(span, priorityBtn, editBtn, deleteBtn);
    }

    function buildEditRow(li, todo) {
      const errorId = `edit-error-${todo.id}`;

      // Edit input
      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'edit-input';
      input.value = todo.text;
      input.setAttribute('aria-label', `Editing: ${todo.text}`);
      input.setAttribute('aria-describedby', errorId);
      input.setAttribute('autocomplete', 'off');

      // Error message (hidden until needed)
      const error = document.createElement('span');
      error.id = errorId;
      error.className = 'edit-error sr-only';
      error.setAttribute('aria-live', 'assertive');
      error.textContent = '';

      // Save button
      const saveBtn = document.createElement('button');
      saveBtn.className = 'save-btn';
      saveBtn.textContent = 'Save';
      saveBtn.setAttribute('aria-label', `Save edit for ${todo.text}`);

      // Cancel button
      const cancelBtn = document.createElement('button');
      cancelBtn.className = 'cancel-btn';
      cancelBtn.textContent = 'Cancel';
      cancelBtn.setAttribute('aria-label', `Cancel edit for ${todo.text}`);

      function attemptSave() {
        const trimmed = input.value.trim();
        if (!trimmed) {
          input.setAttribute('aria-invalid', 'true');
          error.textContent = 'Todo text cannot be empty.';
          error.classList.remove('sr-only');
          input.focus();
          return;
        }
        const todo_ref = todos.find(t => t.id === todo.id);
        if (todo_ref) todo_ref.text = trimmed;
        editingId = null;
        render();
        announce(`Updated: ${trimmed}`);
        // Return focus to edit button (same as cancel)
        const editBtn = document.querySelector(`[data-id="${todo.id}"] .icon-btn`);
        if (editBtn) editBtn.focus();
      }

      function cancelEdit() {
        editingId = null;
        render();
        const editBtn = document.querySelector(`[data-id="${todo.id}"] .icon-btn`);
        if (editBtn) editBtn.focus();
      }

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); attemptSave(); }
        if (e.key === 'Escape') { cancelEdit(); }
      });

      saveBtn.addEventListener('click', attemptSave);
      cancelBtn.addEventListener('click', cancelEdit);

      li.append(input, saveBtn, cancelBtn, error);
    }

    // ─── Actions ─────────────────────────────────────────────────────────────
    function addTodo(text, priority) {
      todos.push({ id: nextId++, text, priority });
      render();
      announce(`Added: ${text}`);
    }

    function deleteTodo(id) {
      const list = document.getElementById('todo-list');
      const items = Array.from(list.querySelectorAll('li[data-id]'));
      const idx = items.findIndex(li => Number(li.dataset.id) === id);

      const todo = todos.find(t => t.id === id);
      const deletedText = todo ? todo.text : '';

      todos = todos.filter(t => t.id !== id);
      render();
      announce(`Deleted: ${deletedText}`);

      // Move focus: next item → previous item → add input
      const updatedItems = Array.from(document.querySelectorAll('#todo-list li[data-id]'));
      const target = updatedItems[idx] || updatedItems[idx - 1];
      if (target) {
        const deleteBtn = target.querySelector('.delete-btn');
        if (deleteBtn) deleteBtn.focus();
      } else {
        document.getElementById('new-todo-input').focus();
      }
    }

    function startEdit(id) {
      editingId = id;
      render();
      const input = document.querySelector(`[data-id="${id}"] .edit-input`);
      if (input) input.focus();
    }

    function startPriorityChange(id) {
      const todo = todos.find(t => t.id === id);
      if (!todo) return;

      const li = document.querySelector(`[data-id="${id}"]`);
      if (!li) return;

      const priorityBtn = li.querySelector('.priority-btn');
      if (!priorityBtn) return;

      // Replace badge with inline select
      const sel = document.createElement('select');
      sel.className = 'priority-select';
      sel.setAttribute('aria-label', `Priority for ${todo.text}`);

      ['now', 'this-week', 'later'].forEach(val => {
        const opt = document.createElement('option');
        opt.value = val;
        opt.textContent = PRIORITY_HUMAN[val];
        if (val === todo.priority) opt.selected = true;
        sel.appendChild(opt);
      });

      const originalPriority = todo.priority;

      function commitChange() {
        const newPriority = sel.value;
        todo.priority = newPriority;
        render();
        announce(`Priority changed to ${PRIORITY_HUMAN[newPriority]}`);
        // Return focus to priority badge
        const badge = document.querySelector(`[data-id="${id}"] .priority-btn`);
        if (badge) badge.focus();
      }

      function cancelChange() {
        // Restore original badge without saving
        render();
        const badge = document.querySelector(`[data-id="${id}"] .priority-btn`);
        if (badge) badge.focus();
      }

      sel.addEventListener('change', commitChange);

      sel.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') { e.preventDefault(); cancelChange(); }
      });

      sel.addEventListener('blur', () => {
        // If focus moves outside the select without a change, cancel
        if (sel.value === originalPriority) {
          cancelChange();
        }
        // If value changed, commitChange already fired via 'change' event
      });

      priorityBtn.replaceWith(sel);
      sel.focus();
    }

    // ─── Event wiring ────────────────────────────────────────────────────────
    document.getElementById('add-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const input = document.getElementById('new-todo-input');
      const priority = document.getElementById('new-todo-priority').value;
      const text = input.value.trim();
      if (!text) return; // Belt-and-suspenders; browser required handles this
      addTodo(text, priority);
      input.value = '';
      input.focus();
    });

    document.getElementById('sort-btn').addEventListener('click', () => {
      sortEnabled = !sortEnabled;
      const btn = document.getElementById('sort-btn');
      btn.setAttribute('aria-pressed', String(sortEnabled));
      render();
      announce(sortEnabled ? 'Sorted by priority' : 'Original order restored');
    });

    // ─── Init ────────────────────────────────────────────────────────────────
    render();
  </script>
</body>
</html>
