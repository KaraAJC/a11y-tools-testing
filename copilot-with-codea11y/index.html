<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessible Todo List</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 600px;
            padding: 30px;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }

        .input-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .todo-list {
            list-style: none;
            padding: 0;
        }

        .todo-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .todo-item button {
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 5px 10px;
            cursor: pointer;
        }

        .todo-item button:hover {
            background: #764ba2;
        }

        .priority-label {
            font-size: 0.9rem;
            font-weight: bold;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="main-heading">Accessible Todo List</h1>
        <section class="input-section" aria-labelledby="add-todo-heading">
            <h2 id="add-todo-heading">Add a new todo</h2>
            <form id="todo-form">
                <div class="input-group">
                    <label for="todo-input">Todo:</label>
                    <input type="text" id="todo-input" name="todo" aria-required="true" placeholder="Enter your todo" />
                </div>
                <div class="input-group">
                    <label for="priority-select">Priority:</label>
                    <select id="priority-select" name="priority" aria-required="true">
                        <option value="now">Now</option>
                        <option value="this-week">This Week</option>
                        <option value="later">Later</option>
                    </select>
                </div>
                <button type="submit">Add Todo</button>
            </form>
        </section>
        <section class="todo-section" aria-labelledby="todo-list-heading">
            <h2 id="todo-list-heading">Your Todos</h2>
            <ul class="todo-list" role="list" aria-live="polite">
                <!-- Todo items will be dynamically added here -->
            </ul>
        </section>
    </div>
</body>
</html>
